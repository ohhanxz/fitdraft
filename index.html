<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitDraft</title>

    <!-- SEO -->
    <meta
      name="description"
      content="FitDraft is a 2D virtual outfit builder. Drag garment images onto a clean canvas, compose looks, and save your wardrobe — all in the browser."
    />
    <meta name="theme-color" content="#0000c5" />

    <!-- Icons: text-free Z-blue mark so the favicon doesn't look squashed. -->
    <link rel="icon" type="image/png" href="/logo-mark-blue.png" />
    <link rel="apple-touch-icon" href="/logo-mark-blue.png" />

    <!-- Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FitDraft — build outfits visually" />
    <meta
      property="og:description"
      content="Drag garment images onto a clean canvas, compose looks, and save your wardrobe — all in the browser."
    />
    <meta property="og:image" content="/logo.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="FitDraft — build outfits visually" />
    <meta
      name="twitter:description"
      content="Drag garment images onto a clean canvas, compose looks, and save your wardrobe — all in the browser."
    />
    <meta name="twitter:image" content="/logo.png" />

    <!-- Fonts: Space Mono is the entire design system. Self-hosted (see
         src/styles/fonts.css + public/fonts/) — no third-party font request.
         Preload the two main weights so text paints without a flash. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/space-mono-400-latin.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/space-mono-700-latin.woff2"
      crossorigin
    />

    <style>
      /* First-paint shell — a solid Z-blue field that the React splash screen
         continues seamlessly once it mounts (no flash of a different colour). */
      #app-loading {
        position: fixed;
        inset: 0;
        background: #0000c5;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loading"></div>
    </div>
    <noscript>
      <div
        style="
          font-family: 'Space Mono', monospace;
          max-width: 480px;
          margin: 80px auto;
          padding: 0 24px;
          text-align: center;
          color: #18181b;
        "
      >
        <h1 style="color: #0000c5">FitDraft</h1>
        <p>FitDraft needs JavaScript enabled to build and save outfits. Please turn it on and reload.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
